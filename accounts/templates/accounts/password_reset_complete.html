{% extends 'accounts/base.html' %}

{% block title %}Password Changed | Examly{% endblock %}

{% block content %}
<div class="simple-card-wrapper">
    <div class="simple-card text-center">
        <div class="auth-icon" style="background: rgba(22, 163, 74, 0.12); color: var(--color-success);">
            <i class="bi bi-check-circle-fill"></i>
        </div>
        <h3 class="fw-bold mb-2">Password Changed!</h3>
        <p class="text-muted mb-4">
            Your password has been set successfully. You may go ahead and log in now.
        </p>
        <a href="{% url 'login' %}" class="btn btn-primary w-100 fw-bold py-2">
            <i class="bi bi-box-arrow-in-right me-1"></i> Log In
        </a>
    </div>
</div>
{% endblock %}
