{% extends 'accounts/admin_dashboard.html' %}

{% block title %}Delete Category | Examly{% endblock %}

{% block erp_content %}
<div class="container py-2">
  <div class="row justify-content-center">
    <div class="col-lg-5">
      <div class="qa-card text-center" style="border: 1px solid #282854;">
        <div class="card-body p-4 p-md-5">
          <div class="feature-icon bg-danger text-white mb-3 mx-auto d-flex align-items-center justify-content-center" style="width: 60px; height: 60px; border-radius: 12px; font-size: 24px;">
            <i class="bi bi-exclamation-triangle"></i>
          </div>
          <h3 class="fw-bold mb-3" style="color: #f6f4ff;">Delete Category</h3>
          <p class="text-muted mb-4" style="color: #8f8fd2 !important;">
            Are you sure you want to delete the category<br>
            <strong style="color: #fff; font-size: 1.1rem;">{{ category.name }}</strong>?<br>
            <small class="text-danger mt-2 d-block">This action cannot be undone.</small>
          </p>

          <form method="POST">
            {% csrf_token %}
            <div class="d-flex gap-2 justify-content-center">
              <button type="submit" class="btn btn-danger px-4 py-2 fw-bold" style="background-color: #f03e65; border: none;">
                <i class="bi bi-trash me-1"></i>Yes, Delete
              </button>
              <a href="{% url 'category_list' %}" class="btn px-4 py-2" style="background: transparent; color: #b6b6ff; border: 1px solid #363676;">
                Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
