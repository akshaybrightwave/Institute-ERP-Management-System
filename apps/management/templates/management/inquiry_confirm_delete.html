{% extends 'management/base.html' %}

{% block management_content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="m-card text-center py-5">
      <div class="text-danger mb-4">
        <i class="bi bi-exclamation-triangle" style="font-size: 4rem;"></i>
      </div>
      <h3 class="fw-bold text-white mb-2">Delete Inquiry?</h3>
      <p class="text-muted mb-4">Are you sure you want to permanently delete the inquiry for <strong>{{ inquiry.full_name }}</strong>? This action cannot be undone.</p>
      
      <form method="POST" class="d-flex justify-content-center gap-2">
        {% csrf_token %}
        <a href="{% url 'inquiry_detail' inquiry.pk %}" class="btn btn-outline-secondary js-skip-action-modal">Cancel</a>
        <button type="submit" class="btn btn-danger">Confirm Delete</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
