  ══════════════════════════════════════════ */

  /* ── Skeleton Loaders ── */
  .skeleton {
    background: linear-gradient(90deg, #1e293b 25%, #273548 50%, #1e293b 75%) !important;
    background-size: 200% 100% !important;
    animation: skeleton-shimmer 1.5s infinite !important;
    border-radius: 6px !important;
    color: transparent !important;
  }
  .skeleton-card {
    height: 120px;
    border-radius: 14px;
    background: linear-gradient(90deg, #1e293b 25%, #273548 50%, #1e293b 75%);
    background-size: 200% 100%;
    animation: skeleton-shimmer 1.5s infinite;
  }
  .skeleton-row { height: 20px; margin-bottom: 10px; border-radius: 4px; }
  .skeleton-row.short { width: 60%; }
  @keyframes skeleton-shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
