{% extends 'management/base.html' %}

{% block title %}Add Lead Note | Examly{% endblock %}

{% block management_content %}
<div class="d-flex align-items-center justify-content-between mb-4">
  <div>
    <h2 class="fw-bold text-white mb-1">Add Timeline Note</h2>
    <p class="text-muted small mb-0">Record new updates for <strong class="text-white">{{ lead.inquiry.full_name }}</strong></p>
  </div>
  <div class="d-flex gap-2">
    <a href="{% url 'lead_notes_list' lead.pk %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Cancel</a>
  </div>
</div>

<div class="row">
  <div class="col-lg-6 mx-auto">
    <div class="m-card">
      <h5 class="fw-bold text-white mb-3"><i class="bi bi-chat-left-text text-success me-2"></i>Log Update</h5>
      
      <form method="POST" class="needs-validation" novalidate>
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label text-muted small fw-bold">Note Description</label>
          <textarea name="note" class="form-control bg-dark border-secondary text-white" rows="6" placeholder="Describe the outcome of the call or follow-up..." required></textarea>
        </div>
        
        <button type="submit" class="btn btn-success w-100 fw-bold py-2 mt-2">
          <i class="bi bi-check-lg me-1"></i> Save Note
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
