{% extends 'accounts/base.html' %}

{% block style %}
<style>
  body {
    background-color: #0d0d1a !important;
    color: #fff;
  }
  main.container {
    max-width: 100% !important;
    padding: 0 !important;
    margin: 0 !important;
    width: 100% !important;
  }
  .management-sidebar {
    position: fixed;
    top: 56px;
    left: 0;
    bottom: 0;
    width: 230px;
    background: #111120;
    border-right: 1px solid #1e1e35;
    overflow-y: auto;
    z-index: 600;
    display: flex;
    flex-direction: column;
  }
  .sidebar-section {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #4a4a6a;
    padding: 1rem 1.2rem 0.35rem;
    text-transform: uppercase;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.65rem 1.2rem;
    color: #9090b8;
    text-decoration: none;
    font-size: 0.88rem;
    font-weight: 500;
    transition: background 0.15s, color 0.15s;
  }
  .sidebar-item:hover, .sidebar-item.active {
    color: #fff;
    background: #1a1a30;
    text-decoration: none;
  }
  .sidebar-item.active {
    border-left: 3px solid #0dcaf0;
    padding-left: calc(1.2rem - 3px);
    background: #14142b;
  }
  .management-content {
    margin-left: 230px;
    padding: 1.4rem 1.8rem;
    min-height: calc(100vh - 56px);
    background: #0d0d1a;
  }
  
  .m-card {
    background: #111120;
    border: 1px solid #1e1e35;
    border-radius: 12px;
    padding: 1.2rem;
    color: #fff;
    box-shadow: 0 4px 18px rgba(0,0,0,0.4);
  }
  .m-table {
    color: #c0c0e0;
  }
  .m-table th {
    color: #fff;
    background-color: #16162a !important;
    border-bottom: 2px solid #2a2a4a;
  }
  .m-table td {
    border-bottom: 1px solid #1e1e35;
    background-color: transparent !important;
    vertical-align: middle;
  }
  .empty-state {
    text-align: center;
    padding: 3rem;
    color: #5a5a8a;
  }
  .empty-state i {
    font-size: 3rem;
    margin-bottom: 1rem;
    color: #3a3a5a;
  }
</style>
{% block extra_style %}{% endblock %}
{% endblock %}

{% block content %}
<aside class="management-sidebar">
  <div class="sidebar-section">Management Portal</div>
  <a href="{% url 'management_dashboard' %}" class="sidebar-item {% if request.resolver_match.url_name == 'management_dashboard' %}active{% endif %}">
    <i class="bi bi-speedometer2"></i> Dashboard
  </a>
  <div class="sidebar-section">Telecaller Module</div>
  <a href="{% url 'inquiry_list' %}" class="sidebar-item {% if 'inquiry' in request.resolver_match.url_name %}active{% endif %}">
    <i class="bi bi-person-plus"></i> Inquiries
  </a>
  <a href="{% url 'lead_list' %}" class="sidebar-item {% if 'lead' in request.resolver_match.url_name %}active{% endif %}">
    <i class="bi bi-funnel"></i> Leads
  </a>
  <a href="{% url 'call_log_list' %}" class="sidebar-item {% if 'call_log' in request.resolver_match.url_name %}active{% endif %}">
    <i class="bi bi-telephone-outbound"></i> Call Logs
  </a>
  <a href="{% url 'followup_list' %}" class="sidebar-item {% if 'followup' in request.resolver_match.url_name %}active{% endif %}">
    <i class="bi bi-clock-history"></i> Follow-Ups
  </a>
</aside>

<div class="management-content">
  {% block management_content %}
  {% endblock %}
</div>
{% endblock %}
