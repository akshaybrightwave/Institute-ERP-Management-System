{% extends 'accounts/admin_dashboard.html' %}

{% block title %}Delete Center | Examly{% endblock %}

{% block erp_content %}
<div class="container py-2">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0">
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="feature-icon bg-danger text-white"><i class="bi bi-exclamation-triangle"></i></div>
                    <h3 class="fw-bold mb-3">Delete Center</h3>
                    <p class="text-muted mb-4">Are you sure you want to delete the center <strong>{{ center.name }}</strong>? This action cannot be undone.</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2 justify-content-center">
                            <button type="submit" class="btn btn-danger px-4 py-2">
                                <i class="bi bi-trash me-1"></i> Delete Confirm
                            </button>
                            <a href="{% url 'center_list' %}" class="btn btn-outline-secondary px-4 py-2">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
