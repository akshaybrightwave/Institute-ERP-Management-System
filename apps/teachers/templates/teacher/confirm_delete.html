{% extends 'accounts/base.html' %}

{% block title %}Delete Profile | Examly{% endblock %}

{% block content %}
<div class="simple-card-wrapper">
    <div class="simple-card text-center">
        <div class="auth-icon" style="background: rgba(220, 38, 38, 0.12); color: var(--color-danger);">
            <i class="bi bi-exclamation-triangle"></i>
        </div>
        <h3 class="fw-bold mb-2">Delete Your Profile?</h3>
        <p class="text-muted mb-4">This action cannot be undone. Your teacher profile information will be permanently removed.</p>
        <form method="post" class="d-flex gap-2">
            {% csrf_token %}
            <a href="{% url 'teacher_profile' %}" class="btn btn-outline-primary flex-grow-1 py-2">Cancel</a>
            <button type="submit" class="btn btn-danger flex-grow-1 py-2">
                <i class="bi bi-trash me-1"></i> Yes, Delete
            </button>
        </form>
    </div>
</div>
{% endblock %}
